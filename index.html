<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Ana Carvalho - Interactive Portfolio</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #9c794a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 1366 / 768;
        }

        canvas.emscripten {
            border: 0px none;
            outline: none;
            width: 100%;
            height: 100%;
            display: block;
            background-color: black;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <script type='text/javascript'>
        var Module = {
            canvas: (function () {
                var canvas = document.getElementById('canvas');
                canvas.width = 1366;
                canvas.height = 768;

                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. Please reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })()
        };
    </script>

    <script async type="text/javascript" src="Portfolio_web.js"></script>
</body>
</html>
