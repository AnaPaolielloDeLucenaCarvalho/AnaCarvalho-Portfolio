<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Debug Mode - Ana Carvalho</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }
        canvas.emscripten {
            border: 2px solid #555;
            display: block;
            margin: 20px auto;
            width: 800px;
            height: 450px;
        }

        #output {
            width: 800px;
            height: 150px;
            margin: 10px auto;
            background: black;
            color: lime;
            font-family: monospace;
            padding: 10px;
            overflow-y: scroll;
            border: 1px solid #444;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h2>Engine Debug View</h2>
        <div id="status">Downloading...</div>
    </div>

    <canvas class="emscripten" id="canvas" tabindex="-1"></canvas>

    <div id="output"></div>

    <script type='text/javascript'>
        var statusElement = document.getElementById('status');
        var outputElement = document.getElementById('output');

        var Module = {
            print: (function () {
                return function (text) {
                    outputElement.innerHTML += text + "<br>";
                    outputElement.scrollTop = outputElement.scrollHeight;
                };
            })(),
            canvas: (function () {
                return document.getElementById('canvas');
            })(),
            setStatus: function (text) {
                statusElement.innerHTML = text;
            }
        };
    </script>
    <script async type="text/javascript" src="Portfolio_web.js"></script>
</body>
</html>
