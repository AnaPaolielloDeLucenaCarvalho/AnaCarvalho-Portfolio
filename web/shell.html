<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Ana Carvalho - Interactive Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #9c794a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas.emscripten {
            border: 0px none;
            background-color: transparent;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1366 / 768;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script type='text/javascript'>
        var Module = {
            canvas: (function () {
                var canvas = document.getElementById('canvas');

                canvas.width = 1366;
                canvas.height = 768;

                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. Please reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })()
        };
    </script>

    {{{ SCRIPT }}}
</body>
</html>
