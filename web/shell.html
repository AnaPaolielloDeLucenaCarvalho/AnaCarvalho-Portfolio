<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Ana Carvalho - Interactive Portfolio</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            overflow: hidden;
        }

        canvas.emscripten {
            border: 0px none;
            background-color: black;
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script type='text/javascript'>
        var Module = {
            canvas: (function () {
                var canvas = document.getElementById('canvas');

                canvas.width = 1366;
                canvas.height = 768;

                canvas.addEventListener("webglcontextlost", function (e) {
                    alert('WebGL context lost. Please reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })()
        };
    </script>

    {{{ SCRIPT }}}
</body>
</html>
